<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>aigate</title>
<style>
  :root{--bg:#0b0e14;--panel:#141922;--line:#232a36;--fg:#e6edf3;--dim:#8b98a9;
        --green:#3fb950;--yellow:#d29922;--red:#f85149;--accent:#58a6ff}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--fg);font:14px/1.5 -apple-system,SF Pro,Segoe UI,sans-serif}
  header{display:flex;align-items:center;gap:12px;padding:14px 20px;border-bottom:1px solid var(--line);position:sticky;top:0;background:var(--bg);z-index:5}
  header h1{font-size:16px;margin:0;letter-spacing:.5px}
  header .logo{font-size:20px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--red);box-shadow:0 0 8px var(--red)}
  .dot.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  .wrap{padding:20px;max-width:1200px;margin:0 auto;display:grid;gap:20px}
  .grid{display:grid;gap:14px;grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
  h2{font-size:12px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin:0 0 10px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px}
  .acct .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
  .acct .name{font-weight:600;font-size:15px}
  .acct .badge{font-size:11px;color:var(--dim)}
  .badge.stale{color:var(--yellow);opacity:.7}
  .bar{margin:9px 0}
  .bar .lbl{display:flex;justify-content:space-between;font-size:12px;color:var(--dim);margin-bottom:4px}
  .bar .lbl b{color:var(--fg)}
  .track{height:8px;border-radius:6px;background:#0b0e14;overflow:hidden;border:1px solid var(--line)}
  .fill{height:100%;transition:width .4s ease,background .4s}
  .runaway{border-color:var(--red);box-shadow:0 0 0 1px var(--red),0 0 20px -6px var(--red)}
  .needsauth{border-color:#d29922;box-shadow:0 0 0 1px #d29922}
  .disabled{opacity:.45}
  table{width:100%;border-collapse:collapse}
  td,th{text-align:left;padding:6px 10px;border-bottom:1px solid var(--line);font-size:13px}
  th{color:var(--dim);font-weight:500;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
  .feed{max-height:420px;overflow:auto;font:12px/1.6 ui-monospace,Menlo,monospace}
  .feed .row{padding:6px 10px;border-bottom:1px solid var(--line);display:flex;gap:10px;align-items:baseline}
  .feed .t{color:var(--dim);white-space:nowrap}
  .feed .a{color:var(--accent);white-space:nowrap}
  .feed .h{color:var(--yellow);white-space:nowrap}
  .feed .p{color:var(--fg);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
  .cols{display:grid;gap:20px;grid-template-columns:1fr 1fr}
  @media(max-width:820px){.cols{grid-template-columns:1fr}}
  .mono{font-family:ui-monospace,Menlo,monospace;font-size:12px}
  form.keyform{display:flex;gap:12px;flex-wrap:wrap;align-items:flex-end}
  form.keyform label{display:flex;flex-direction:column;gap:4px;font-size:12px;color:var(--dim)}
  form.keyform input{width:auto}
  button.del{background:var(--red);color:#fff;padding:4px 10px;font-size:12px}
  #login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px}
  input{background:var(--panel);border:1px solid var(--line);color:var(--fg);padding:10px 12px;border-radius:8px;width:320px;font-size:14px}
  button{background:var(--accent);color:#001; border:0;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer}
</style></head>
<body>
<div id="login">
  <div class="logo" style="font-size:32px">🛡️ aigate</div>
  <div style="color:var(--dim)">Enter API token</div>
  <input id="tok" type="password" placeholder="AIGATE_TOKEN" autofocus>
  <button onclick="save()">Connect</button>
  <div id="loginmsg" style="color:var(--red);font-size:12px;min-height:16px"></div>
</div>

<header style="display:none" id="hdr">
  <span class="logo">🛡️</span><h1>AIGATE</h1>
  <span class="dot" id="live" title="live"></span>
  <span style="margin-left:auto;color:var(--dim);font-size:12px" id="clock"></span>
</header>
<div class="wrap" style="display:none" id="app">
  <section><h2>Accounts — live usage</h2><div class="grid" id="accts"></div></section>
  <section><h2>Provider API keys</h2>
    <div class="card" style="margin-bottom:14px">
      <form class="keyform" id="keyform">
        <label>Provider
          <input id="kprov" list="provlist" placeholder="openai" autocomplete="off" style="width:200px">
          <datalist id="provlist"></datalist>
        </label>
        <label>Label <span style="opacity:.6">(optional)</span>
          <input id="klabel" placeholder="prod" style="width:150px">
        </label>
        <label>API key
          <input id="kkey" type="password" placeholder="paste secret" style="width:300px">
        </label>
        <button type="submit">Add key</button>
        <span id="khint" class="mono" style="color:var(--dim)"></span>
      </form>
      <div id="kmsg" style="margin-top:10px;font-size:12px;min-height:16px"></div>
    </div>
    <table id="keys"><thead><tr><th>Provider</th><th>Label</th><th>Key</th><th>Status</th><th>Added</th><th>Last used</th><th></th></tr></thead><tbody></tbody></table>
  </section>
  <div class="cols">
    <section class="card"><h2>Live activity</h2><div class="feed" id="feed"></div></section>
    <section class="card"><h2>By host / device</h2><table id="hosts"><thead><tr><th>Host</th><th>Requests</th><th>Tokens</th><th>Last</th></tr></thead><tbody></tbody></table></section>
  </div>
</div>

<script>
const $=s=>document.querySelector(s);
const esc=s=>String(s??'').replace(/[&<>"']/g,c=>'&#'+c.charCodeAt(0)+';');
let TOKEN=localStorage.aigate_token||'';
let statsT;
function save(){TOKEN=$('#tok').value.trim();localStorage.aigate_token=TOKEN;boot();}
function color(p){return p>=80?'var(--red)':p>=50?'var(--yellow)':'var(--green)'}
const fmtAge=s=>s<60?s+'s':s<3600?Math.floor(s/60)+'m':s<86400?Math.floor(s/3600)+'h':Math.floor(s/86400)+'d';  // fmtAge(90)==='1m', fmtAge(3600)==='1h'
// sqlite timestamps are bare UTC ("2026-07-11 18:30:00", no Z) — V8 parses those as LOCAL; stamp them UTC. ISO-Z (live WS rows) passes through.
const toDate=s=>new Date(/[TZ]/.test(String(s))?s:String(s).replace(' ','T')+'Z');  // +toDate('2026-07-11 18:30:00') === Date.UTC(2026,6,11,18,30,0)

function renderAccounts(list){
  const el=$('#accts'); el.innerHTML='';
  if(!list||!list.length){el.innerHTML='<div class="card" style="color:var(--dim)">no accounts yet — run <span class="mono">claude setup-token</span>, then add the <span class="mono">sk-ant-oat01…</span> line via the add-account skill or <span class="mono">POST /api/accounts</span> (paste the token there, never here)</div>';return;}
  for(const a of list){
    const worst=Math.max(a.five_hour_pct||0,a.seven_day_pct||0);
    const run=worst>=80, card=document.createElement('div');
    const parkTxt=a.parked_until?'→'+toDate(a.parked_until).toLocaleTimeString():'';
    const badge=a.disabled?'disabled':a.reauth_needed?'🔑 re-auth':a.parked?'⏸ parked'+parkTxt:(a.has_token?'ready':'no token');
    // usage_age_s absent → old server, fall back to the raw usage_updated line; null → never polled
    const ageKnown=a.usage_age_s!==undefined, stale=ageKnown&&a.usage_age_s>1500;
    const updated=!ageKnown?'updated '+(a.usage_updated||'never'):a.usage_age_s==null?'never':fmtAge(a.usage_age_s)+' ago';
    card.className='card acct'+(run?' runaway':'')+(a.reauth_needed?' needsauth':'')+(a.disabled||a.parked?' disabled':'');
    card.innerHTML=`<div class="top"><span class="name">${esc(a.account)}</span>
      <span class="badge">${badge} ${run?'🚨':''}</span></div>
      ${bar('5-hour',a.five_hour_pct)}${bar('weekly',a.seven_day_pct)}
      <div class="badge${stale?' stale':''}" style="margin-top:8px">${updated}</div>`;
    el.appendChild(card);
  }
}
function bar(lbl,p){p=Math.round(p||0);return `<div class="bar"><div class="lbl">${lbl}<b>${p}%</b></div>
  <div class="track"><div class="fill" style="width:${p}%;background:${color(p)}"></div></div></div>`}

function addFeed(d){
  const f=$('#feed'),r=document.createElement('div');r.className='row';
  const t=(d.ts?toDate(d.ts):new Date()).toLocaleTimeString();
  r.innerHTML=`<span class="t">${t}</span><span class="a">${esc(d.account||'?')}</span><span class="h">${esc(d.host||'')}</span><span class="p">${esc(d.prompt||d.action||'')}</span>`;
  f.prepend(r); while(f.children.length>200)f.lastChild.remove();
}
async function api(path){const r=await fetch(path,{headers:{authorization:'Bearer '+TOKEN}});if(r.status===401)throw 401;return r.json();}
// seed the feed from BOTH prompt logs and access events; an old server that 404s /api/access yields no access rows
async function seedFeed(){
  const logs=await api('/api/logs?limit=50');   // 401 here propagates → logout; access is best-effort
  const acc=await api('/api/access?limit=50').then(r=>Array.isArray(r)?r:[]).catch(()=>[]);
  [...logs,...acc.map(r=>({...r,prompt:'▸ '+r.action+(r.result&&r.result!=='ok'?' — '+r.result:'')}))]
    .sort((a,b)=>toDate(a.ts)-toDate(b.ts)).forEach(addFeed);
}

// ---- provider keys ----
let PROVIDERS=[];
async function loadProviders(){
  PROVIDERS=await api('/api/providers');
  const dl=$('#provlist'); dl.innerHTML='';
  for(const p of PROVIDERS){const o=document.createElement('option');o.value=p.id;o.label=p.name;dl.appendChild(o);}
}
function providerHint(){
  const id=$('#kprov').value.trim(), p=PROVIDERS.find(x=>x.id===id);
  $('#khint').textContent=p?(p.prefix?`↳ ${p.name} — keys usually start "${p.prefix}"`:`↳ ${p.name}`):(id?'↳ custom provider':'');
}
async function loadKeys(){renderKeys(await api('/api/keys'));}
function renderKeys(rows){
  const tb=$('#keys tbody'); tb.innerHTML='';
  if(!rows||!rows.length){tb.innerHTML='<tr><td colspan="7" style="color:var(--dim)">no keys yet — add one above</td></tr>';return;}
  for(const k of rows){
    const tr=document.createElement('tr');
    tr.innerHTML=`<td>${esc(k.provider)}</td><td>${esc(k.label||'—')}</td><td class="mono">${esc(k.key_hint||'—')}</td>
      <td>${esc(k.status||'')}</td><td class="mono">${k.created_at?toDate(k.created_at).toLocaleString():''}</td>
      <td class="mono">${k.last_used?toDate(k.last_used).toLocaleString():'<span style="color:var(--dim)">never</span>'}</td>
      <td><button class="del">✕</button></td>`;
    tr.querySelector('.del').onclick=()=>delKey(k.id);
    tb.appendChild(tr);
  }
}
async function addKey(e){
  e.preventDefault();
  const provider=$('#kprov').value.trim(), key=$('#kkey').value.trim(), label=$('#klabel').value.trim(), msg=$('#kmsg');
  if(!provider||!key){msg.style.color='var(--red)';msg.textContent='provider + key required';return;}
  msg.style.color='var(--dim)';msg.textContent='adding…';
  try{
    const r=await fetch('/api/keys',{method:'POST',headers:{authorization:'Bearer '+TOKEN,'content-type':'application/json'},body:JSON.stringify({provider,key,label})});
    const j=await r.json().catch(()=>({}));
    if(r.ok){msg.style.color='var(--green)';msg.textContent='✓ added '+provider;$('#kkey').value='';$('#klabel').value='';loadKeys();}
    else{msg.style.color='var(--red)';msg.textContent='✗ '+(j.error||('HTTP '+r.status));}
  }catch(err){msg.style.color='var(--red)';msg.textContent='✗ '+err;}
}
async function delKey(id){
  if(!confirm('Delete this key?'))return;
  await fetch('/api/keys/'+id,{method:'DELETE',headers:{authorization:'Bearer '+TOKEN}});
  loadKeys();
}
function renderHosts(rows){const tb=$('#hosts tbody');tb.innerHTML='';for(const h of rows||[]){
  tb.insertAdjacentHTML('beforeend',`<tr><td>${esc(h.host||'—')}</td><td>${h.requests}</td><td>${h.tokens||0}</td><td>${h.last?toDate(h.last).toLocaleString():''}</td></tr>`)}}

let ws;
function connect(){
  ws=new WebSocket((location.protocol==='https:'?'wss':'ws')+'://'+location.host+'/ws',['aigate','bearer.'+TOKEN]);
  ws.onopen=async()=>{$('#live').classList.add('on');
    try{const s=await api('/api/stats');renderAccounts(s.accounts);renderHosts(s.by_host);
      renderKeys(await api('/api/keys'));
      $('#feed').innerHTML='';await seedFeed();
    }catch(e){if(e===401){localStorage.removeItem('aigate_token');location.reload();}}};
  ws.onclose=()=>{$('#live').classList.remove('on');setTimeout(connect,2000)};
  ws.onmessage=e=>{const m=JSON.parse(e.data);
    if(m.type==='accounts')renderAccounts(m.data);
    else if(m.type==='keys')renderKeys(m.data);
    else if(m.type==='prompt'){addFeed(m.data);clearTimeout(statsT);statsT=setTimeout(()=>api('/api/stats').then(s=>renderHosts(s.by_host)).catch(()=>{}),1500)}
    else if(m.type==='access')addFeed({...m.data,prompt:'▸ '+m.data.action+(m.data.result&&m.data.result!=='ok'?' — '+m.data.result:'')});
  };
}
async function boot(){
  if(!TOKEN)return;
  try{const s=await api('/api/stats');renderAccounts(s.accounts);renderHosts(s.by_host);
    await loadProviders();await loadKeys();
    await seedFeed();}
  catch(e){
    if(e===401){localStorage.removeItem('aigate_token');$('#loginmsg').textContent='token rejected — check it and try again';}
    else{$('#loginmsg').textContent="can't reach server, retrying…";setTimeout(boot,3000);}
    return;}
  $('#login').style.display='none';$('#hdr').style.display='flex';$('#app').style.display='grid';
  $('#keyform').onsubmit=addKey; $('#kprov').oninput=providerHint;
  connect();
  setInterval(()=>$('#clock').textContent=new Date().toLocaleTimeString(),1000);
}
$('#tok').onkeydown=e=>e.key==='Enter'&&save();
boot();
</script>
</body></html>
